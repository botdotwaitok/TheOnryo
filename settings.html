<div id="theonryo_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>TheOnryo</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="theonryo-row">
                <label class="checkbox_label" for="theonryo_enabled">
                    <input type="checkbox" id="theonryo_enabled" />
                    <span>Auto Keep-Alive</span>
                </label>
            </div>

            <div class="theonryo-status-row">
                <span class="theonryo-status-label">Status:</span>
                <span id="theonryo_status" class="theonryo-status-badge theonryo-inactive">Inactive</span>
            </div>
            <div id="theonryo_stop_row" class="theonryo-row" style="display:none;">
                <div id="theonryo_stop_btn" class="menu_button">
                    <i class="ph-bold ph-stop-circle"></i>
                    <span>Stop Playback</span>
                </div>
            </div>
        </div>
    </div>
</div>
