<div id="theonryo_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>TheOnryo</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="theonryo-row">
                <label class="checkbox_label" for="theonryo_enabled">
                    <input type="checkbox" id="theonryo_enabled" />
                    <span>Auto Keep-Alive</span>
                </label>
            </div>

            <div class="theonryo-row">
                <div id="theonryo_toggle_btn" class="menu_button">
                    <i id="theonryo_toggle_icon" class="ph-bold ph-play-circle"></i>
                    <span id="theonryo_toggle_label">Play</span>
                </div>
            </div>
        </div>
    </div>
</div>
